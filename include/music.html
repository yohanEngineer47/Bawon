<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BAWON+</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:#04060c;
    color:white;
    font-family:Montserrat,sans-serif;
}

.hero{

    min-height:100vh;

    background:
    linear-gradient(
        rgba(0,80,255,0.35),
        rgba(0,0,0,0.85)
    ),
    url("img/music.jpg");

    background-size:cover;
    background-position:center;

    display:flex;
    align-items:center;
}

.content{

    max-width:700px;
    padding:80px;
}

h1{

    font-size:70px;

    margin:0;

    font-family:"Playfair Display", serif;
}

span{

    color:#4da8ff;
}

p{

    font-size:18px;

    line-height:1.8;

    color:#eee;

    margin:25px 0;
}

.btn{

    display:inline-block;

    padding:14px 28px;

    background:#4da8ff;

    color:black;

    text-decoration:none;

    border-radius:8px;

    font-weight:700;
}

<body>

<section class="hero">

    <div class="content">

        <h1>
            Musique & <span>Création</span>

        <p>

            soutenir la création musicale,
            les studios et la diffusion

        <a href="../index.html" class="btn">

        </a>
