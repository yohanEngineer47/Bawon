<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer un compte | BAWON+</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Montserrat,sans-serif;

    background:
    linear-gradient(
        rgba(0,0,0,0.75),
        rgba(0,0,0,0.75)
    ),
    url("img/img_back.png");

    background-size:cover;
    background-position:center;
}

.register-box{

    width:430px;

    padding:45px;

    border-radius:20px;

    background:rgba(0,0,0,0.7);

    border:1px solid rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    box-shadow:0 0 35px rgba(0,0,0,0.4);

    color:white;
}

.logo{

    text-align:center;
    margin-bottom:25px;
}

.logo h1{

    margin:0;

    font-size:58px;

    font-weight:200;

    color:rgb(255,177,31);
}

.logo p{

    color:#d9b790;

    font-style:italic;

    font-family:"Playfair Display",serif;
}

.group{

    margin-bottom:18px;
}

.group label{

    display:block;

    margin-bottom:8px;

    color:#d9b790;

    font-size:14px;
}

.group input{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:15px;

    outline:none;
}

.group input:focus{

    border:1px solid #d9b790;
}

button{

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    margin-top:10px;

    background:linear-gradient(
        90deg,
        rgb(255,177,31),
        #d9b790
    );

    font-size:16px;

    font-weight:700;

    cursor:pointer;
}

button:hover{

    background:white;
}

.bottom{

    text-align:center;

    margin-top:20px;

    color:#aaa;
}

.bottom a{

    color:#d9b790;

    text-decoration:none;

    font-weight:600;
}

.status{

    text-align:center;

    margin-top:15px;

    color:lightgreen;

    display:none;
}

</style>
</head>
<body>

<div class="register-box">

    <div class="logo">

        <h1>BAWON+</h1>

        <p>Créer votre compte</p>

    </div>

    <form id="registerForm">

        <div class="group">
            <label>Nom complet</label>
            <input type="text" id="name" required>
        </div>

        <div class="group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="group">
            <label>Mot de passe</label>
            <input type="password" id="password" required>
        </div>

        <button type="submit">
            Créer mon compte
        </button>

        <div class="status" id="status">
            Compte créé avec succès
        </div>

    </form>

    <div class="bottom">

        Déjà inscrit ?

        <a href="login.html">
            Se connecter
        </a>

    </div>

</div>

<script>

const form = document.getElementById("registerForm");

form.addEventListener("submit", function(e){

    e.preventDefault();

    const name =
        document.getElementById("name").value;

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    const user = {

        name:name,
        email:email,
        password:password,
        logged:true

    };

    // Sauvegarde du compte
    localStorage.setItem(
        "bawonAccount",
        JSON.stringify(user)
    );

    // Connexion automatique
    localStorage.setItem(
        "bawonUser",
        JSON.stringify(user)
    );

    document.getElementById("status")
        .style.display = "block";

    setTimeout(function(){

        window.location.href =
            "../index.html";

    },1500);

});

</script>

</body>
</html>
